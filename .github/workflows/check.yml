name: Check Runner

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: System Info
        run: |
          echo "==== CPU ===="
          nproc
          lscpu

          echo "==== Memory ===="
          free -h

          echo "==== Disk ===="
          df -h

      - name: CPU load test
        run: |
          echo "==== CPU load test ===="
          for i in {1..2}; do sha1sum /dev/zero & done
          sleep 5

      - name: Ulimit
        run: |
          echo "==== Ulimit ===="
          ulimit -a